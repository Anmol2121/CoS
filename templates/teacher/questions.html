{% extends "base.html" %}
{% block sidebar %}{% endblock %}
{% block content %}
    <h2>Manage Questions</h2>
    <form method="post">
        <div class="mb-3">
            <label>Question Text</label>
            <textarea name="text" class="form-control" rows="2" required></textarea>
        </div>
        <div class="row">
            <div class="col-md-6 mb-3">
                <label>Option A</label>
                <input name="opt_a" class="form-control" required>
            </div>
            <div class="col-md-6 mb-3">
                <label>Option B</label>
                <input name="opt_b" class="form-control" required>
            </div>
            <div class="col-md-6 mb-3">
                <label>Option C</label>
                <input name="opt_c" class="form-control" required>
            </div>
            <div class="col-md-6 mb-3">
                <label>Option D</label>
                <input name="opt_d" class="form-control" required>
            </div>
        </div>
        <div class="mb-3">
            <label>Correct Option</label>
            <select name="correct" class="form-select">
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="C">C</option>
                <option value="D">D</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Add Question</button>
    </form>

    <h3 class="mt-4">Existing Questions</h3>
    <ul class="list-group">
        {% for q in questions %}
        <li class="list-group-item">{{ q.text }} (Ans: {{ q.correct_option }})</li>
        {% endfor %}
    </ul>
{% endblock %}
