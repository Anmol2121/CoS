{% extends "base.html" %}
{% block content %}
<style>
    .login-container {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-radius: 1rem;
        padding: 2rem;
        overflow: hidden;
    }
    .login-card {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border-radius: 1rem;
        box-shadow: 0 25px 45px rgba(0,0,0,0.2);
        padding: 2rem;
        width: 100%;
        max-width: 450px;
        z-index: 2;
        animation: slideIn 0.8s ease-out;
    }
    .login-card h2 {
        color: #333;
        margin-bottom: 1.5rem;
        text-align: center;
        font-weight: 600;
    }
    .login-card .form-label {
        font-weight: 500;
        color: #555;
    }
    .login-card .form-control {
        border-radius: 50px;
        padding: 10px 20px;
        border: 1px solid #ddd;
        transition: all 0.3s;
    }
    .login-card .form-control:focus {
        border-color: #667eea;
        box-shadow: 0 0 0 0.2rem rgba(102,126,234,0.25);
    }
    .login-card .btn-login {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border: none;
        border-radius: 50px;
        padding: 12px;
        font-weight: 600;
        transition: transform 0.3s, box-shadow 0.3s;
    }
    .login-card .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }
    .login-card .forgot-link {
        text-align: center;
        margin-top: 1rem;
    }
    .login-card .forgot-link a {
        color: #667eea;
        text-decoration: none;
        transition: color 0.3s;
    }
    .login-card .forgot-link a:hover {
        color: #764ba2;
    }
    @keyframes slideIn {
        from {
            opacity: 0;
            transform: translateY(50px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    /* Floating elements */
    .floating-icon {
        position: absolute;
        width: 60px;
        height: 60px;
        background: rgba(255,255,255,0.1);
        border-radius: 50%;
        animation: float 6s ease-in-out infinite;
        z-index: 1;
        pointer-events: none;
    }
    .floating-icon:nth-child(1) { top: 10%; left: 10%; width: 80px; height: 80px; animation-delay: 0s; }
    .floating-icon:nth-child(2) { bottom: 15%; right: 15%; width: 100px; height: 100px; animation-delay: 2s; }
    .floating-icon:nth-child(3) { top: 30%; right: 20%; width: 50px; height: 50px; animation-delay: 1s; }
    .floating-icon:nth-child(4) { bottom: 25%; left: 20%; width: 70px; height: 70px; animation-delay: 3s; }
    @keyframes float {
        0% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(-20px) rotate(5deg); }
        100% { transform: translateY(0px) rotate(0deg); }
    }
</style>

<div class="login-container">
    <div class="floating-icon"></div>
    <div class="floating-icon"></div>
    <div class="floating-icon"></div>
    <div class="floating-icon"></div>
    <div class="login-card">
        <h2>Login to Your Account</h2>
        <form method="post">
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-login w-100 text-white">Sign In</button>
        </form>
        <div class="forgot-link">
            <a href="{{ url_for('forgot_password') }}">Forgot Password?</a>
        </div>
    </div>
</div>

<script>
    // Add additional interactive effect: animate on mouse move
    const container = document.querySelector('.login-container');
    if (container) {
        container.addEventListener('mousemove', (e) => {
            const rect = container.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const card = document.querySelector('.login-card');
            if (card) {
                const moveX = (x / rect.width - 0.5) * 10;
                const moveY = (y / rect.height - 0.5) * 10;
                card.style.transform = `translate(${moveX}px, ${moveY}px)`;
            }
        });
        container.addEventListener('mouseleave', () => {
            const card = document.querySelector('.login-card');
            if (card) card.style.transform = 'translate(0, 0)';
        });
    }
</script>
{% endblock %}
