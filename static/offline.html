<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Coaching System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">
    <div class="text-center max-w-md mx-auto">
        <div class="w-24 h-24 mx-auto bg-gray-200 rounded-full flex items-center justify-center mb-6">
            <i class="fas fa-wifi text-4xl text-gray-400"></i>
        </div>
        <h1 class="text-2xl font-bold text-gray-800 mb-2">You're offline</h1>
        <p class="text-gray-600 mb-6">Please check your internet connection and try again.</p>
        <button onclick="location.reload()" class="bg-primary-600 hover:bg-primary-700 text-white font-medium py-2 px-6 rounded-lg transition-colors">
            Retry
        </button>
    </div>
</body>
</html>
